apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: miheret217/auth-service:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
          # Replace with your actual Auth-specific Supabase URL
          - name: DATABASE_URL
            value: "postgres://postgres.ekdjzirbeiakbqpcjhnb:RMfLaxJEkR9kgUYc@aws-1-eu-west-1.pooler.supabase.com:6543/postgres"
          - name: SECRET_KEY
            value: "django-insecure-pharmacy-system-key-2024"
          - name: DEBUG
            value: "True"
          - name: ALLOWED_HOSTS
            value: "*"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP