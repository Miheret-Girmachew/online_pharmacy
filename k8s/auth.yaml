apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: miheret217/auth-service:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
          # --- DATABASE CONNECTION (Supabase) ---
          - name: DATABASE_URL
            value: "postgres://postgres.ekdjzirbeiakbqpcjhnb:RMfLaxJEkR9kgUYc@aws-1-eu-west-1.pooler.supabase.com:6543/postgres"
          
          # --- DJANGO SETTINGS ---
          - name: SECRET_KEY
            value: "django-insecure-pharmacy-system-key-2024"
          - name: DEBUG
            value: "True"
          - name: ALLOWED_HOSTS
            value: "*"

          # --- REDIS MESSAGE BROKER CONNECTION ---
          - name: REDIS_URL
            value: "redis://redis-service:6379"
          - name: REDIS_HOST
            value: "redis-service"
          - name: REDIS_PORT
            value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth
  ports:
    - protocol: TCP
      port: 80         
      targetPort: 8000 
  type: ClusterIP