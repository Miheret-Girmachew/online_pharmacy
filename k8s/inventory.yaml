apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
      - name: inventory
        image: miheret217/inventory-service:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
          # Database Connection
          - name: SPRING_DATASOURCE_URL
            value: "jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require"
          - name: SPRING_DATASOURCE_USERNAME
            value: "postgres.ekdjzirbeiakbqpcjhnb"
          - name: SPRING_DATASOURCE_PASSWORD
            value: "RMfLaxJEkR9kgUYc"
          - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
            value: "org.postgresql.Driver"

          # JPA / Hibernate Settings
          - name: SPRING_JPA_HIBERNATE_DDL_AUTO
            value: "update"
          - name: SPRING_JPA_SHOW_SQL
            value: "true"
          - name: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
            value: "org.hibernate.dialect.PostgreSQLDialect"

          # SSL Configuration for Supabase
          - name: SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSL
            value: "true"
          - name: SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSLFACTORY
            value: "org.postgresql.ssl.NonValidatingFactory"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  selector:
    app: inventory
  ports:
    - protocol: TCP
      port: 80       
      targetPort: 8080 
  type: ClusterIP