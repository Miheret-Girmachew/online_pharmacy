apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
      - name: inventory
        image: miheret217/inventory-service:latest 
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
          - name: SPRING_DATASOURCE_URL
            value: "jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0"
          - name: SPRING_DATASOURCE_USERNAME
            value: "postgres.ekdjzirbeiakbqpcjhnb"
          - name: SPRING_DATASOURCE_PASSWORD
            value: "RMfLaxJEkR9kgUYc"
          - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
            value: "org.postgresql.Driver"

          # --- JPA / HIBERNATE SETTINGS ---
          - name: SPRING_JPA_HIBERNATE_DDL_AUTO
            value: "update"
          - name: SPRING_JPA_SHOW_SQL
            value: "true"
          - name: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
            value: "org.hibernate.dialect.PostgreSQLDialect"

          # --- SSL CONFIGURATION FOR SUPABASE ---
          - name: SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSL
            value: "true"
          - name: SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSLFACTORY
            value: "org.postgresql.ssl.NonValidatingFactory"

          # --- REDIS MESSAGE BROKER CONNECTION ---
          - name: SPRING_DATA_REDIS_HOST
            value: "redis-service"
          - name: SPRING_DATA_REDIS_PORT
            value: "6379"

          # --- KAFKA MESSAGE BUS CONNECTION (The Final Fix) ---
          - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
            value: "kafka-service:9092"
          - name: SPRING_KAFKA_CONSUMER_GROUP_ID
            value: "inventory-group"
          - name: SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET
            value: "earliest"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  selector:
    app: inventory
  ports:
    - protocol: TCP
      port: 80         
      targetPort: 8080 
  type: ClusterIP
