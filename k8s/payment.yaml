apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: miheret217/payment-service:v2 
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
          - name: CHAPA_SECRET_KEY
            value: "CHASECK_TEST-OnIpBYA3c0Xh3sLxxmv9DhEvAbjvOadq"
          - name: CHAPA_WEBHOOK_SECRET
            value: "MySuperSecretHash123!"

          - name: DATABASE_URL
            value: "postgres://postgres.ekdjzirbeiakbqpcjhnb:RMfLaxJEkR9kgUYc@aws-1-eu-west-1.pooler.supabase.com:6543/postgres"
          
          - name: KAFKA_BOOTSTRAP_SERVERS
            value: "kafka-service:9092"
          - name: REDIS_URL
            value: "redis://redis-service:6379"
          - name: REDIS_HOST
            value: "redis-service"

          - name: SECRET_KEY
            value: "payment-service-secret-key-123"
          - name: DEBUG
            value: "True"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector:
    app: payment
  ports:
    - protocol: TCP
      port: 80        
      targetPort: 8000
  type: ClusterIP
