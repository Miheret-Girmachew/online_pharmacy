name: Build and Push Microservices

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Server/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service_name: auth-service
            directory: ./Server/auth-service
          - service_name: inventory-service
            directory: ./Server/inventory-service
          - service_name: notification-service
            directory: ./Server/pharmacy-notification-service
          - service_name: order-service
            directory: ./Server/order_service
          - service_name: payment-service
            directory: ./Server/payment-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check for Changes
        id: check
        run: |
          # Detects if the specific folder for this matrix job was changed
          if git diff --name-only HEAD^ HEAD | grep "${{ matrix.directory }}"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.directory }}
          push: true
          # This automatically creates miheret217/auth-service:latest, etc.
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service_name }}:latest